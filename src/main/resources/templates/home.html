<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee App</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: green;
        }

        p {
            font-size: 20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 th:text="${title}"></h1>

    <p th:text="${message}"></p>

</div>

</body>

</html>
